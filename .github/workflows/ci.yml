name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-node:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install CJK + emoji fonts (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: CJK font smoke (post-build)
        run: |
          node dist/cli.js doctor --json > doctor.json
          node -e "const r=require('./doctor.json'); if(!r.fonts.cjk_family){console.error('FAIL: no cjk_family detected'); console.error(JSON.stringify(r.fonts,null,2)); process.exit(1)}; console.log('OK: cjk_family =',r.fonts.cjk_family)"

  test-bun:
    name: Test (Bun on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CJK + emoji fonts (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

      - name: CJK font smoke (post-build)
        run: |
          bun run dist/cli.js doctor --json > doctor.json
          node -e "const r=require('./doctor.json'); if(!r.fonts.cjk_family){console.error('FAIL: no cjk_family detected'); console.error(JSON.stringify(r.fonts,null,2)); process.exit(1)}; console.log('OK: cjk_family =',r.fonts.cjk_family)"

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Publish to npm via Trusted Publishing (OIDC, with provenance)
        run: npm publish

      - name: Generate release notes from conventional commits
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Collect commits by conventional prefix (skip merge commits)
          feats="" fixes="" perfs="" docs="" refactors="" chores="" others=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip prefix to get the message body
            case "$line" in
              feat:*|feat\(*\):*)     feats="${feats}\n- ${line#*: }" ;;
              fix:*|fix\(*\):*)       fixes="${fixes}\n- ${line#*: }" ;;
              perf:*|perf\(*\):*)     perfs="${perfs}\n- ${line#*: }" ;;
              docs:*|docs\(*\):*)     docs="${docs}\n- ${line#*: }" ;;
              refactor:*|refactor\(*\):*) refactors="${refactors}\n- ${line#*: }" ;;
              ci:*|ci\(*\):*)         chores="${chores}\n- ${line#*: }" ;;
              test:*|test\(*\):*)     chores="${chores}\n- ${line#*: }" ;;
              chore:*|chore\(*\):*)   chores="${chores}\n- ${line#*: }" ;;
              *)                      others="${others}\n- ${line}" ;;
            esac
          done < <(git log --format="%s" --no-merges "$RANGE" 2>/dev/null || true)

          # Build markdown body
          {
            echo "body<<RELEASE_NOTES_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since ${PREV_TAG}"
            else
              echo "## Changes"
            fi
            echo ""
            [ -n "$feats" ]     && { echo "### ✨ Features"; echo -e "$feats"; echo ""; }
            [ -n "$fixes" ]     && { echo "### 🐛 Bug Fixes"; echo -e "$fixes"; echo ""; }
            [ -n "$perfs" ]     && { echo "### ⚡ Performance"; echo -e "$perfs"; echo ""; }
            [ -n "$refactors" ] && { echo "### ♻️ Refactoring"; echo -e "$refactors"; echo ""; }
            [ -n "$docs" ]      && { echo "### 📝 Documentation"; echo -e "$docs"; echo ""; }
            [ -n "$chores" ]    && { echo "### 🔧 Chores"; echo -e "$chores"; echo ""; }
            [ -n "$others" ]    && { echo "### 📦 Other"; echo -e "$others"; echo ""; }
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Bump Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: okooo5km/homebrew-tap
          formula: bm
          tag: ${{ github.ref_name }}
          revision: ${{ github.sha }}
          force: false

      - name: Auto-merge Homebrew bump PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: okooo5km/homebrew-tap
        run: |
          # action-homebrew-bump-formula opens a PR on branch `bump-{formula}-{version}`.
          # Personal tap has no branch protection / required reviews, so we squash-merge
          # it immediately. Sha256 + url are computed from the actual tarball by the
          # bump action, so direct merge is safe.
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="bump-bm-${VERSION}"
          PR=""
          for i in 1 2 3 4 5 6; do
            PR=$(gh pr list --repo "$TAP_REPO" --head "$BRANCH" --state open \
                   --json number --jq '.[0].number // empty')
            [ -n "$PR" ] && break
            echo "PR not visible yet, retrying in 5s..."
            sleep 5
          done
          if [ -z "$PR" ]; then
            echo "::error::No bump PR found on branch $BRANCH after 30s"
            exit 1
          fi
          echo "Merging PR #$PR on $TAP_REPO"
          gh pr merge "$PR" --repo "$TAP_REPO" --squash --delete-branch
